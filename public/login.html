<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Quote Engine</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      margin-top: 10px;
    }

    button {
      background: #111;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .error-message {
      color: #b91c1c;
      margin-top: 12px;
      min-height: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Quote Engine</h1>
    <p>Inserisci la password per entrare nell’area interna.</p>

    <form id="loginForm">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required />
      <button type="submit">Entra</button>
    </form>

    <div id="errorMessage" class="error-message"></div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
